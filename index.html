<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <link rel="stylesheet" type="text/css" href="main.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <meta charset="UTF-8" />
</head>
<body>
    <table id="table" class="chess-board"></table>
    <div class="history">
        <h2>Moves</h2>

        <div class="move-list">
            <table class="move-table">
                <thead>
                    ...
                </thead>

                <tbody id="moveTableBody"></tbody>
            </table>
        </div>
    </div>

    <script src="gameObjects.js"></script>
    <script src="moves.js"></script>
    
    <script>
        const wasmSupported = typeof WebAssembly === "object"
            && WebAssembly.validate(Uint8Array.of(0x0, 0x61, 0x73, 0x6d, 0x01, 0x00, 0x00, 0x00));

        const stockfish = new Worker("stockfish-18-lite-single.js");

        stockfish.addEventListener("message", (e) => {
            //console.log(e.data);
        });

        stockfish.postMessage("uci");
        stockfish.postMessage("isready");
        
        var currentTurn = "white";
        var hasGameEnded = false;
        let enPassantTarget = null;
        let canEnPassant = false; 
        const moveHistory = [];
        let halfMoveClock = 0;

        const botColor = "black";       
        let isBotThinking = false;      

        const backRow = [Rook, Knight, Bishop, Queen, King, Bishop, Knight, Rook];

        let checkResolvingMoves = null;
        var currentTile = null;

        const board = [];
        const table = document.querySelector("table");

        for (let y = 0; y < 8; y++) {
            const row = document.createElement("tr");
            board[y] = [];
            for (let x = 0; x < 8; x++) {
                const cell = document.createElement("td");
                const tile = { x, y, occupied: false, piece: null, isHighlighted: false, element: cell };
                board[y][x] = tile;
                cell.addEventListener("click", () => { handleTileClick(tile); });
                row.appendChild(cell);
            }
            table.appendChild(row);
        }

        function ChangeTurn() {
            currentTurn = currentTurn == "white" ? "black" : "white";
        }

        function EndGame() {
            hasGameEnded = true;
            console.log(currentTurn + " won the game");
        }

        function isKingInCheck(board, color) {
            let kingTile = null;
            for (let y = 0; y < 8; y++) {
                for (let x = 0; x < 8; x++) {
                    const piece = board[y][x].piece;
                    if (piece instanceof King && piece.color === color) {
                        kingTile = board[y][x];
                    }
                }
            }
            if (kingTile == null) return false;

            for (let y = 0; y < 8; y++) {
                for (let x = 0; x < 8; x++) {
                    const piece = board[y][x].piece;
                    if (piece != null && piece.color !== color) {
                        const moves = piece.getMoves(board, x, y);
                        if (moves.includes(kingTile)) return true;
                    }
                }
            }
            return false;
        }

        function wouldBeInCheck(piece, fromTile, toTile) {
            const capturedPiece = toTile.piece;
            toTile.piece = piece;
            fromTile.piece = null;

            const inCheck = isKingInCheck(board, piece.color);

            fromTile.piece = piece;
            toTile.piece = capturedPiece;
            return inCheck;
        }

        function getLegalMoves(piece, tile) {
            const pseudoMoves = piece.getMoves(board, tile.x, tile.y);
            return pseudoMoves.filter(move => !wouldBeInCheck(piece, tile, move));
        }

        function hasAnyLegalMove(color) {
            for (let y = 0; y < 8; y++) {
                for (let x = 0; x < 8; x++) {
                    const piece = board[y][x].piece;
                    if (piece != null && piece.color === color) {
                        if (getLegalMoves(piece, board[y][x]).length > 0) return true;
                    }
                }
            }
            return false;
        }

        function isPromotionRank(piece, y) {
            return (piece.color === "white" && y === 0) || (piece.color === "black" && y === 7);
        }

        function showPromotionDialog(color, callback) {
            const overlay = document.createElement("div");
            overlay.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:flex;justify-content:center;align-items:center;z-index:1000;";

            const box = document.createElement("div");
            box.style.cssText = "background:white;padding:20px;display:flex;gap:10px;border-radius:8px;";

            const options = [
                { cls: Queen, symbol: color === "white" ? "♕" : "♛" },
                { cls: Rook, symbol: color === "white" ? "♖" : "♜" },
                { cls: Bishop, symbol: color === "white" ? "♗" : "♝" },
                { cls: Knight, symbol: color === "white" ? "♘" : "♞" }
            ];

            options.forEach(opt => {
                const btn = document.createElement("button");
                btn.textContent = opt.symbol;
                btn.style.cssText = "font-size:40px;cursor:pointer;";
                btn.addEventListener("click", () => {
                    document.body.removeChild(overlay);
                    callback(opt.cls);
                });
                box.appendChild(btn);
            });

            overlay.appendChild(box);
            document.body.appendChild(overlay);
        }

        function executeMove(fromTile, toTile, promotionPieceClass = null) {
            const moveRecord = {
                fromX: fromTile.x, fromY: fromTile.y,
                toX: toTile.x, toY: toTile.y,
                piece: fromTile.piece,
                capturedPiece: toTile.piece,
                wasPromote: false,
                wasCastling: false,
                wasEnPassant: false,
            };

            const isCastling = fromTile.piece instanceof King
                && Math.abs(toTile.x - fromTile.x) === 2;

            const isEnPassant = toTile.piece === null
                && fromTile.piece instanceof Pawn
                && Math.abs(toTile.x - fromTile.x) === 1
                && toTile.y !== fromTile.y;

            if (isEnPassant) {
                moveRecord.wasEnPassant = true;
                moveRecord.capturedPiece = board[fromTile.y][toTile.x].piece;

                board[fromTile.y][toTile.x].piece = null;
                board[fromTile.y][toTile.x].occupied = false;
                board[fromTile.y][toTile.x].element.textContent = "";
            }

            enPassantTarget = null;
            canEnPassant = false;

            if (fromTile.piece instanceof Pawn && Math.abs(toTile.y - fromTile.y) === 2) {
                enPassantTarget = toTile;
            }

            toTile.piece = fromTile.piece;
            toTile.occupied = true;
            toTile.piece.hasMoved = true;
            renderPiece(toTile);
            fromTile.piece = null;
            fromTile.element.textContent = "";

            if (isCastling) {
                moveRecord.wasCastling = true;
                const isKingside = toTile.x > fromTile.x;
                const rookFromX = isKingside ? toTile.x + 1 : toTile.x - 2;
                const rookToX = isKingside ? toTile.x - 1 : toTile.x + 1;

                const rookFromTile = board[toTile.y][rookFromX];
                const rookToTile = board[toTile.y][rookToX];

                rookToTile.piece = rookFromTile.piece;
                rookToTile.piece.hasMoved = true;
                renderPiece(rookToTile);
                rookFromTile.piece = null;
                rookFromTile.element.textContent = "";
            }

            if (toTile.piece instanceof Pawn && isPromotionRank(toTile.piece, toTile.y)) {
                moveRecord.wasPromote = true;
                const color = toTile.piece.color;

                if (promotionPieceClass != null) {
                    toTile.piece = new promotionPieceClass(color);
                    toTile.piece.hasMoved = true;
                    renderPiece(toTile);
                    finishMove(moveRecord);
                } else {
                    showPromotionDialog(color, (chosenClass) => {
                        toTile.piece = new chosenClass(color);
                        toTile.piece.hasMoved = true;
                        renderPiece(toTile);
                        finishMove(moveRecord);
                    });
                }
                return;
            }

            finishMove(moveRecord);
        }

        function finishMove(moveRecord) {
            moveHistory.push(moveRecord);
            addMoveToHistoryTable(moveRecord);

            const opponent = currentTurn == "white" ? "black" : "white";

            if (isKingInCheck(board, opponent)) {
                if (!hasAnyLegalMove(opponent)) EndGame();
            } else if (!hasAnyLegalMove(opponent)) {
                hasGameEnded = true;
                console.log("Draw");
            }

            if (moveRecord.piece instanceof Pawn || moveRecord.capturedPiece != null)
                halfMoveClock = 0;
            else
                halfMoveClock++;

            if (halfMoveClock >= 100) {
                hasGameEnded = true;
                console.log("Draw");
            }

            ChangeTurn();

            if (!hasGameEnded && currentTurn === botColor) {
                triggerBotMove();
            }
        }

        function handleTileClick(tile) {
            if (hasGameEnded || isBotThinking) return; 

            console.log(tile);

            if (currentTile != null && !tile.isHighlighted) {
                CleanTilePreview();
            }
            else if (currentTile != null && tile.isHighlighted) {
                CleanTilePreview();
                const fromTile = currentTile;
                currentTile = null;
                executeMove(fromTile, tile); 
                return;
            }

            if (tile.piece != null && tile.piece.color == currentTurn) {
                currentTile = tile;
                ChangeTilePreview();
            }
            else if (tile.piece == null) {
                currentTile = null;
            }
        }

        function CleanTilePreview() {
            const moves = currentTile.piece.getMoves(board, currentTile.x, currentTile.y);
            if (moves != null) {
                moves.forEach(move => {
                    move.element.style.backgroundColor = "";
                    move.isHighlighted = false;
                });
            }
        }

        function ChangeTilePreview() {
            if (currentTile.piece != null) {
                canEnPassant = currentTile.piece instanceof Pawn && enPassantTarget != null;

                const moves = getLegalMoves(currentTile.piece, currentTile);
                moves.forEach(move => {
                    move.isHighlighted = true;
                    move.element.style.backgroundColor = "green";
                });
            }
        }

        function setupBoard() {
            for (let x = 0; x < 8; x++) {
                board[0][x].piece = new backRow[x]("black");
                board[1][x].piece = new Pawn("black");
                board[6][x].piece = new Pawn("white");
                board[7][x].piece = new backRow[x]("white");
            }
        }

        function renderBoard() {
            for (let y = 0; y < 8; y++) {
                for (let x = 0; x < 8; x++) {
                    const tile = board[y][x];

                    if (tile.piece != null) {
                        renderPiece(tile);
                    }
                    else {
                        tile.element.textContent = "";
                    }
                }
            }
        }


        function toAlgebraic(x, y) {
            const file = String.fromCharCode("a".charCodeAt(0) + x);
            const rank = 8 - y;
            return `${file}${rank}`;
        }

        function algebraicToCoords(square) {
            const x = square.charCodeAt(0) - "a".charCodeAt(0);
            const y = 8 - parseInt(square[1], 10);
            return { x, y };
        }

        function getCastlingRights(board) {
            let rights = "";
            const wk = board[7][4].piece;
            const wrH = board[7][7].piece;
            const wrA = board[7][0].piece;
            const bk = board[0][4].piece;
            const brH = board[0][7].piece;
            const brA = board[0][0].piece;

            if (wk instanceof King && !wk.hasMoved && wrH instanceof Rook && !wrH.hasMoved) rights += "K";
            if (wk instanceof King && !wk.hasMoved && wrA instanceof Rook && !wrA.hasMoved) rights += "Q";
            if (bk instanceof King && !bk.hasMoved && brH instanceof Rook && !brH.hasMoved) rights += "k";
            if (bk instanceof King && !bk.hasMoved && brA instanceof Rook && !brA.hasMoved) rights += "q";

            return rights.length ? rights : "-";
        }

        function boardToFEN(board, currentTurn) {
            const pieceChars = { Pawn: "p", Knight: "n", Bishop: "b", Rook: "r", Queen: "q", King: "k" };

            let fen = "";
            for (let y = 0; y < 8; y++) {
                let emptyCount = 0;
                for (let x = 0; x < 8; x++) {
                    const piece = board[y][x].piece;
                    if (piece == null) {
                        emptyCount++;
                    } else {
                        if (emptyCount > 0) { fen += emptyCount; emptyCount = 0; }
                        const char = pieceChars[piece.constructor.name];
                        fen += piece.color === "white" ? char.toUpperCase() : char;
                    }
                }
                if (emptyCount > 0) fen += emptyCount;
                if (y < 7) fen += "/";
            }

            fen += ` ${currentTurn === "white" ? "w" : "b"}`;
            fen += ` ${getCastlingRights(board)}`;                         
            fen += enPassantTarget != null                                   
                ? ` ${toAlgebraic(enPassantTarget.x, enPassantTarget.y)}`
                : " -";
            fen += ` ${halfMoveClock}`;                                      
            fen += ` ${Math.floor(moveHistory.length / 2) + 1}`;             

            return fen;
        }

        function getBotMove(fen, callback) {
            stockfish.postMessage(`position fen ${fen}`);
            stockfish.postMessage("go depth 15");

            const listener = (e) => {
                if (typeof e.data === "string" && e.data.startsWith("bestmove")) {
                    const move = e.data.split(" ")[1];
                    stockfish.removeEventListener("message", listener);
                    callback(move);
                }
            };
            stockfish.addEventListener("message", listener);
        }

        function applyUCIMove(uciMove) { 
            if (uciMove == null || uciMove === "(none)") return; 

            const fromSquare = uciMove.slice(0, 2);
            const toSquare = uciMove.slice(2, 4);
            const promotionChar = uciMove.length > 4 ? uciMove[4] : null;

            const from = algebraicToCoords(fromSquare);
            const to = algebraicToCoords(toSquare);

            const fromTile = board[from.y][from.x];
            const toTile = board[to.y][to.x];

            const promotionMap = { q: Queen, r: Rook, b: Bishop, n: Knight };
            const promotionClass = promotionChar ? promotionMap[promotionChar] : null;

            executeMove(fromTile, toTile, promotionClass);
        }

        function triggerBotMove() {
            console.log("triggerBotMove called, currentTurn:", currentTurn); 
            isBotThinking = true;
            const fen = boardToFEN(board, currentTurn);
            console.log("Sending FEN:", fen);
            getBotMove(fen, (uciMove) => {
                console.log("Received bestmove:", uciMove); 
                isBotThinking = false;
                applyUCIMove(uciMove);
            });
        }

        function renderPiece(tile) {
            if (tile.piece == null) {
                tile.element.innerHTML = "";
                return;
            }   
            const filename = `${tile.piece.color}-${tile.piece.constructor.name.toLowerCase()}.png`;
            tile.element.innerHTML = `<img src="pieces/${filename}" alt="${tile.piece.color} ${tile.piece.constructor.name}">`;
        }

        function moveToNotation(moveRecord) {
            if (moveRecord.wasCastling) {
                return moveRecord.toX > moveRecord.fromX ? "O-O" : "O-O-O";
            }

            const pieceLetters = { King: "K", Queen: "Q", Rook: "R", Bishop: "B", Knight: "N" };
            const pieceLetter = pieceLetters[moveRecord.piece.constructor.name] || "";

            const toSquare = toAlgebraic(moveRecord.toX, moveRecord.toY);
            const isCapture = moveRecord.capturedPiece != null || moveRecord.wasEnPassant;

            let notation = pieceLetter;
            if (isCapture) {
                if (pieceLetter === "") notation += String.fromCharCode("a".charCodeAt(0) + moveRecord.fromX);
                notation += "x";
            }
            notation += toSquare;

            if (moveRecord.wasPromote) notation += "=Q"; 

            return notation;
        }

        function addMoveToHistoryTable(moveRecord) {
            const tbody = document.getElementById("moveTableBody");
            const notation = moveToNotation(moveRecord);

            if (moveRecord.piece.color === "white") {
                const row = document.createElement("tr");
                const moveNumber = Math.floor(moveHistory.length / 2) + 1;
                row.innerHTML = `<td>${moveNumber}.</td><td>${notation}</td><td></td>`;
                tbody.appendChild(row);
            } else {
                const lastRow = tbody.lastElementChild;
                lastRow.children[2].textContent = notation;
            }
        }

        setupBoard();
        renderBoard();
    </script>

</body>
</html>
